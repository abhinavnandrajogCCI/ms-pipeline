name: Build-Publish-Deploy

env:
  ANYPOINT_CLIENT_ID: ${{ secrets.ANYPOINT_CLIENT_ID }}
  ANYPOINT_CLIENT_SECRET: ${{ secrets.ANYPOINT_CLIENT_SECRET }}
  CONNECTED_APP_CLIENT_ID: ${{ secrets.CONNECTED_APP_CLIENT_ID }}
  CONNECTED_APP_CLIENT_SECRET: ${{ secrets.CONNECTED_APP_CLIENT_SECRET }}
  GRANT_TYPE: ${{ secrets.GRANT_TYPE }}
  PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
  TARGET: ${{ vars.TARGET }}
  CONNECTED_APP_STRING: ${{ secrets.CONNECTED_APP_STRING}}
  ENVIRONMENT: "${{ inputs.environment }}"

on:
  workflow_dispatch:
    inputs:
      repository:
        description: 'Enter the repository name'
        required: true
        type: string
      branch:
        description: 'Branch to build'
        required: true
        default: 'dev'
        type: choice
        options: 
          - 'dev'
          - 'main'
      environment:
        description: "Deployment Environment"
        required: true
        type: choice
        options:
          - Design
          - Sandbox
      vCore:
        description: "vCore on Deployment Target"
        required: true
        type: choice
        options:
          - "0.1"
          - "0.2"
          - "0.5"
          - "1"
          - "2"
          - "4"
      replicas:
        description: "Number of Replicas on Deployment Target"
        required: true
        type: choice
        options:
          - "1"
          - "2"
          - "3"
          - "4"
          - "5"
          - "6"
          - "7"
          - "8"
      skipMunit:
        description: "Skip MUnit tests (only applicable to DEV)"
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

run-name: "Env: ${{ inputs.environment }} | ${{ inputs.repository }} | Build & Deploy"

jobs:          
  Build-Publish-Deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Maven 3.9.9
        uses: s4u/setup-maven-action@v1.12.0
        with:
          java-version: 17
          maven-version: 3.9.9

      - name: Verify Java and Maven Versions
        run: |
          echo "Java version: $(java -version)"
          echo "Maven version: $(mvn --version)"

      - name: Configure Maven settings
        uses: s4u/maven-settings-action@v3.1.0
        with:
          servers: >
            [
              {
                "id": "anypoint-exchange-v3",
                "username": "~~~Client~~~",
                "password": "${{ env.CONNECTED_APP_STRING }}"
              }
            ] 
          repositories: >
            [
              {
                "id": "anypoint-exchange-v3",
                "url": "https://maven.anypoint.mulesoft.com/api/v3/maven",
                "releases": { "enabled": "true" },
                "snapshots": { "enabled": "true" }
              }
            ]
          
      - name: Run MUnit Tests
        if: >
          inputs.environment != 'SANDBOX' &&
          (inputs.environment != 'DESIGN' || inputs.skipMunit != 'true')
        run: |
          echo "Running MUnit Tests..."
          mvn clean test -D"mule.env"="${{ env.ENVIRONMENT }}" -D"app.vCores"="${{ inputs.vCore }}" -D"app.replicas"="${{ inputs.replicas }}"
           
      
      - name: Deploy to Exchange
        run: |
          mvn clean deploy -DskipTests 
     
      - name: Deploy to ${{ inputs.environment }} 
        run: |
          mvn clean deploy -DskipTests -DmuleDeploy -D"appName"="${{ inputs.repository}}-${{env.ENVIRONMENT}}-${{env.TARGET}}" -D"environment"="${{ env.ENVIRONMENT }}" -D"app.vCores"="${{ inputs.vCore }}" -D"app.replicas"="${{ inputs.replicas }}" -D"target"="${{ env.TARGET }}" -D"connectedAppClientId"="${{ env.CONNECTED_APP_CLIENT_ID }}" -D"connectedAppClientSecret"="${{ env.CONNECTED_APP_CLIENT_SECRET }}" -D"connectedAppGrantType"="${{ env.GRANT_TYPE }}" -D"anypoint.platform.client_id"="${{ env.ANYPOINT_CLIENT_ID }}" -D"anypoint.platform.client_secret"="${{ env.ANYPOINT_CLIENT_SECRET }}"
